services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
      POSTGRES_DB: clinic_ai
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    command: redis-server --appendonly yes

  pgweb:
    image: sosedoff/pgweb
    ports: ["8081:8081"]
    environment:
      DATABASE_URL: "postgres://clinic:clinic@postgres:5432/clinic_ai?sslmode=disable"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
